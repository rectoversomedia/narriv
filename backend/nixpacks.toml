[nixpacks]
# Node.js app in the backend directory
dir = "backend"

[nodejs]
version = "22"

[phases.setup]
# Install libssl1.1 for Prisma compatibility on Alpine
cmds = ["echo 'http://dl-cdn.alpinelinux.org/alpine/v3.18/community' >> /etc/apk/repositories", "apk add --no-cache libssl1.1"]

[phases.install]
# Generate Prisma client after npm install
cmds = ["npm install --ignore-scripts", "npx prisma generate"]

[runtime]
# Expose port for the app
port = 3000

[start]
# Start command for the backend
cmd = "npm start"
