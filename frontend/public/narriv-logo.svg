<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Outer glow gradient -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CFF" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#6B4DFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4A2BCC" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner ball gradient -->
    <radialGradient id="ballGradient" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#8B5CFF"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </radialGradient>

    <!-- White ring -->
    <radialGradient id="ringGradient" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="white" stop-opacity="0"/>
      <stop offset="95%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Network node gradient -->
    <radialGradient id="nodeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </radialGradient>

    <!-- Pink dot glow -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8FB8"/>
      <stop offset="100%" stop-color="#FF6FA8" stop-opacity="0.6"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Outer purple glow -->
  <circle cx="100" cy="100" r="95" fill="url(#outerGlow)"/>

  <!-- White ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="url(#ringGradient)" stroke-width="1.5" opacity="0.9"/>

  <!-- Inner glow ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#A78BFA" stroke-width="0.5" opacity="0.4"/>

  <!-- Main purple ball -->
  <circle cx="100" cy="100" r="58" fill="url(#ballGradient)"/>

  <!-- Network connections (neural mesh) -->
  <g stroke="#E9D5FF" stroke-width="0.4" opacity="0.5" fill="none">
    <!-- Latitude lines -->
    <ellipse cx="100" cy="100" rx="56" ry="20"/>
    <ellipse cx="100" cy="100" rx="56" ry="35"/>
    <ellipse cx="100" cy="100" rx="56" ry="50"/>

    <!-- Longitude lines -->
    <ellipse cx="100" cy="100" rx="20" ry="56"/>
    <ellipse cx="100" cy="100" rx="35" ry="56"/>
    <ellipse cx="100" cy="100" rx="50" ry="56"/>

    <!-- Vertical center line -->
    <line x1="100" y1="42" x2="100" y2="158"/>
    <!-- Horizontal center line -->
    <line x1="42" y1="100" x2="158" y2="100"/>
  </g>

  <!-- Network nodes (constellation dots) -->
  <g fill="url(#nodeGradient)">
    <circle cx="70" cy="75" r="1.5"/>
    <circle cx="130" cy="80" r="1.5"/>
    <circle cx="115" cy="65" r="1.5"/>
    <circle cx="85" cy="120" r="1.5"/>
    <circle cx="135" cy="115" r="1.5"/>
    <circle cx="100" cy="135" r="1.5"/>
    <circle cx="65" cy="100" r="1.5"/>
    <circle cx="148" cy="100" r="1.5"/>
    <circle cx="100" cy="65" r="1.5"/>
    <circle cx="80" cy="90" r="1.5"/>
    <circle cx="120" cy="90" r="1.5"/>
    <circle cx="90" cy="110" r="1.5"/>
    <circle cx="110" cy="110" r="1.5"/>
    <circle cx="75" cy="130" r="1.5"/>
    <circle cx="125" cy="130" r="1.5"/>
    <circle cx="90" cy="80" r="1.5"/>
    <circle cx="110" cy="125" r="1.5"/>
  </g>

  <!-- Particle highlights (small bright spots) -->
  <g fill="white" opacity="0.9">
    <circle cx="75" cy="70" r="0.8"/>
    <circle cx="120" cy="75" r="0.8"/>
    <circle cx="130" cy="110" r="0.8"/>
    <circle cx="70" cy="115" r="0.8"/>
    <circle cx="100" cy="130" r="0.8"/>
  </g>

  <!-- Text "Narriv" below -->
  <text x="100" y="187" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="-0.5">Narriv</text>

  <!-- Pink glowing dot on the right -->
  <circle cx="186" cy="118" r="3" fill="url(#dotGlow)"/>
  <circle cx="186" cy="118" r="1.5" fill="white"/>
</svg>