# ============================================
# Narriv Production Docker Compose
# ============================================
# Production-ready deployment with:
# - PostgreSQL with encrypted volumes
# - Redis for BullMQ
# - Nginx reverse proxy
# - Health monitoring
# - Automatic backups
# ============================================

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: narriv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: narriv_production
      POSTGRES_USER: ${POSTGRES_USER:-narriv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-narriv} -d narriv_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - narriv-network
    # Security: No exposed ports, only internal network access

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: narriv-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - narriv-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: narriv-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-narriv}:${POSTGRES_PASSWORD}@db:5432/narriv_production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      APIFY_TOKEN: ${APIFY_TOKEN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@narriv.digital}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TRUST_PROXY: loopback
      ALLOW_INSECURE_HTTP: "false"
      ENABLE_WORKERS: "true"
      SESSION_TIMEOUT_MS: 1800000
      MAX_CONCURRENT_SESSIONS: 3
      RATE_LIMIT_REDIS_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - narriv-network
    # Security: Internal only, accessed via Nginx

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: narriv-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.narriv.digital}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - narriv-network
    # Security: Internal only, accessed via Nginx

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: narriv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - ./uploads:/var/www/narriv/uploads:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - narriv-network

  # Backup Service (runs daily)
  backup:
    image: postgres:16-alpine
    container_name: narriv-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-narriv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: narriv_production
      BACKUP_RETENTION_DAYS: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Backup container started. Running daily backup at 2 AM...'
      while true; do
        CURRENT_HOUR=$$(date +%H)
        if [ \"$$CURRENT_HOUR\" = '02' ]; then
          echo \"[\ $$(date)\ ] Starting daily backup...\"
          pg_dump -Fc -h $$POSTGRES_HOST -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/narriv_$$(date +%Y%m%d_%H%M%S).sql.gz
          echo \"[\ $$(date)\ ] Backup complete: narriv_$$(date +%Y%m%d_%H%M%S).sql.gz\"

          # Clean old backups
          find /backups -name 'narriv_*.sql.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete
          echo \"[\ $$(date)\ ] Old backups cleaned\"
        fi
        sleep 3600
      done
      "
    networks:
      - narriv-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  narriv-network:
    driver: bridge
